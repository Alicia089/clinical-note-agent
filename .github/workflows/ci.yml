name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt flake8
      - run: flake8 app/ tests/ --max-line-length=120
      - run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: test-key-not-used-in-tests

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t clinical-note-agent .

